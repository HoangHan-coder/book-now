<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh sách đặt phòng - BookNow</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </script>

<style>
  /* Specific Logo Positioning Rule */
  .logo-fixed {
    position: fixed;
    top: 0;
    left: 0;
    margin-top: 25px;
    margin-left: 25px;
    z-index: 60; /* Higher than sidebar */
  }

  .gradient-text {
    background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .gradient-icon {
    color: #3b82f6;
  }

  /* Sidebar transitions */
  .sidebar {
    transition: transform 0.3s ease-in-out;
  }

  /* Hide scrollbar for sidebar */
  .no-scrollbar::-webkit-scrollbar {
    display: none;
  }
  .no-scrollbar {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

</style>

</head>

<body class="bg-gray-100 min-h-screen">
<div class="logo-fixed flex items-center gap-3 select-none bg-white/90 backdrop-blur px-3 py-2 rounded-xl shadow-sm lg:shadow-none lg:bg-transparent lg:p-0">
  <div class="w-10 h-10 bg-white rounded-lg shadow-md flex items-center justify-center border border-blue-100">
    <i class="fa-solid fa-house-chimney gradient-icon text-xl"></i>
  </div>
  <div class="flex flex-col justify-center">
    <span class="text-2xl font-extrabold tracking-tight gradient-text leading-none">BookNow</span>
    <span class="text-[10px] text-gray-500 font-medium uppercase tracking-wider pl-0.5">Homestay System</span>
  </div>
</div>

<aside id="sidebar" class="sidebar fixed top-0 left-0 h-full w-64 bg-white border-r border-gray-200 z-50 transform -translate-x-full lg:translate-x-0 pt-28 overflow-y-auto no-scrollbar">
  <!-- Navigation Links -->
  <nav class="px-4 space-y-2">
    <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-lg font-medium transition-colors">
      <i class="fa-solid fa-chart-line w-5"></i>
      Bảng điều khiển
    </a>
    <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 rounded-lg font-medium transition-colors shadow-sm ring-1 ring-black/5">
      <i class="fa-regular fa-calendar-check w-5"></i>
      Đơn đặt phòng
    </a>
    <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-lg font-medium transition-colors">
      <i class="fa-solid fa-door-open w-5"></i>
      Phòng
    </a>
    <a href="/admin/manage-housekeeping" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-lg font-medium transition-colors">
      <i class="fa-solid fa-broom"></i>
      Dọn dẹp
    </a>
    <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-lg font-medium transition-colors">
      <i class="fa-solid fa-users-gear w-5"></i>
      Khách hàng
    </a>
  </nav>

  <!-- Logout at Bottom -->
  <div class="absolute bottom-0 w-full p-4 border-t border-gray-100 bg-white">
    <a href="#" class="flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 rounded-lg font-medium transition-colors">
      <i class="fa-solid fa-arrow-right-from-bracket w-5"></i>
      Đăng xuất
    </a>
  </div>
</aside>

<main class="max-w-7xl mx-auto px-4 py-6 lg:ml-64">


  <div id="housekeeping-lower-content">

  <!-- Quick Actions -->
  <div class="bg-white rounded-lg shadow mb-8 overflow-hidden">
    <div class="px-6 py-4 border-b border-gray-200">
      <h2 class="text-lg font-semibold text-gray-800">Tasks List</h2>
    </div>
    <div class="p-6">

      <!-- Task Table -->
      <table class="w-full">
        <thead class="bg-gray-50">
        <tr class="text-left text-sm text-gray-600">
          <th class="px-6 py-4 font-medium">Room Number</th>
          <th class="px-6 py-4 font-medium">Room Type</th>
          <th class="px-6 py-4 font-medium">Time Checkout</th>
          <th class="px-6 py-4 font-medium">Priority</th>
          <th class="px-6 py-4 font-medium">Status</th>
          <th class="px-6 py-4 font-medium">Assigned To</th>
          <th class="px-6 py-4 font-medium">Action</th>
        </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">

        <tr th:each="task : ${housekeepingTaskLists}" class="hover:bg-gray-50">

          <!-- Room Number -->
          <td class="px-6 py-4">
    <span class="font-bold text-gray-800"
          th:text="${task.room.roomNumber}">
      101
    </span>
          </td>

          <!-- Room Type -->
          <td class="px-6 py-4 text-gray-600"
              th:text="${task.room.roomType.name}">
            Deluxe
          </td>

          <!-- Last Checkout -->
          <td class="px-6 py-4 text-gray-600">
            <div th:text="${#temporals.format(task.booking.checkOutTime,'yyyy-MM-dd')}">
              2026-03-13
            </div>
            <p class="text-xs text-gray-500 mt-1" th:text="${#temporals.format(task.booking.checkOutTime,'HH:mm')}">
              10:00 AM
            </p>
          </td>

          <!-- Priority -->
          <td class="px-6 py-4">
     <span class="px-2 py-1 rounded text-xs font-medium"
           th:text="${task.priority}"
           th:classappend="${task.priority.cssEnumClass}">
</span>

          </td>

          <!-- Status -->
          <td class="px-6 py-4">
        <span class="px-2 py-1 rounded text-xs font-medium"
              th:text="${task.status}"
              th:classappend="${task.status.cssEnumClass}">
        </span>
          </td>

          <!-- Assigned Staff -->
          <td class="px-6 py-4 text-gray-600"
              th:text="${task.assignedTo!= null ? task.assignedTo.fullName : 'Unassigned'}">
            Unassigned
          </td>

          <!-- Action -->
          <td class="px-6 py-4">

            <a th:href="@{/admin/manage-housekeeping/task-detail/{id}(id=${task.id})}"
               class="text-blue-600 hover:underline text-sm mr-3">
              View
            </a>
          </td>

        </tr>

        </tbody>

      </table>
    </div>
  </div>



  </div>
</main>

<!-- Footer -->
<footer class="bg-gray-800 text-white text-center py-4 mt-8">
  <p class="text-sm">BookNow Homestay Management System</p>
</footer>

</body>

</html>
