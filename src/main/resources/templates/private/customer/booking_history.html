<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử đặt phòng - BookNow</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            DEFAULT: '#2563eb', // blue-600
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Custom scrollbar for table */
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- Main Container -->
    <div class="max-w-8xl mx-auto px-4 md:px-8 pt-32 pb-12">
        
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Main Content: Booking Table -->
            <div class="flex-1">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                    
                    <!-- Header -->
                    <div class="p-6 border-b border-gray-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div>
                            <h1 class="text-2xl font-bold text-gray-900">Lịch sử đặt phòng</h1>
                            <p class="text-sm text-gray-500 mt-1">Quản lý và theo dõi các đơn đặt phòng của bạn.</p>
                        </div>
                        <div class="flex gap-2">
                            <div class="relative">
                                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-xs"></i>
                                <input type="text" placeholder="Tìm theo mã..." class="pl-8 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            <button class="bg-white border border-gray-200 text-gray-600 px-3 py-2 rounded-lg text-sm hover:bg-gray-50">
                                <i class="fa-solid fa-filter"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Table -->
                    <div class="overflow-x-auto custom-scrollbar">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-xs uppercase text-gray-500 font-semibold tracking-wider">
                                    <th class="px-6 py-4 rounded-tl-lg">Mã Booking</th>
                                    <th class="px-6 py-4">Tên phòng</th>
                                    <th class="px-6 py-4">Check-in</th>
                                    <th class="px-6 py-4">Check-out</th>
                                    <th class="px-6 py-4 text-center">Trạng thái</th>
                                    <th class="px-6 py-4 text-right rounded-tr-lg">Hành động</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">

                                <tr class="hover:bg-blue-50/50 transition-colors group" th:each="booking : ${bookings}">
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <span class="font-mono text-sm font-bold text-gray-700" th:text="${booking.bookingCode}">#BK88921</span>
                                    </td>
                                    <td class="px-6 py-4">
                                        <div class="flex items-center gap-3">
                                            <img src="https://images.unsplash.com/photo-1590490360182-c33d57733427?ixlib=rb-1.2.1&auto=format&fit=crop&w=100&q=80" class="w-10 h-10 rounded-lg object-cover bg-gray-100" alt="Room">
                                            <div>
                                                <p class="text-sm font-semibold text-gray-900" th:text="${booking.room.roomNumber}">Phòng Tiêu Chuẩn P.101</p>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <p class="text-sm text-gray-700 font-medium" th:text="${booking.checkInTime}">27/06/2026</p>
                                        <p class="text-xs text-gray-400">21:00 - 09:30</p>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap">
                                        <p class="text-sm text-gray-700 font-medium" th:text="${booking.checkOutTime}">27/06/2026</p>
                                        <p class="text-xs text-gray-400">21:00 - 09:30</p>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap text-center">
                                        <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700 border border-green-200">
                                            <i class="fa-solid fa-check-circle"></i> <span th:text="${booking.bookingStatus}"></span>
                                        </span>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap text-right">
                                        <button class="text-sm font-medium text-blue-600 hover:text-blue-800 hover:bg-blue-50 px-3 py-1.5 rounded-lg transition-colors">
                                            Xem chi tiết
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- Pagination -->
                    <div class="p-4 border-t border-gray-100 flex items-center justify-between">
                        <span class="text-xs text-gray-500">Hiển thị 3 trên 12 đơn hàng</span>
                        <div class="flex gap-1">
                            <button class="w-8 h-8 rounded border border-gray-200 flex items-center justify-center text-gray-400 cursor-not-allowed">
                                <i class="fa-solid fa-chevron-left text-xs"></i>
                            </button>
                            <button class="w-8 h-8 rounded bg-blue-600 text-white font-bold text-xs flex items-center justify-center shadow-sm">1</button>
                            <button class="w-8 h-8 rounded border border-gray-200 text-gray-600 hover:border-blue-500 hover:text-blue-600 font-medium text-xs flex items-center justify-center transition-colors">2</button>
                            <button class="w-8 h-8 rounded border border-gray-200 flex items-center justify-center text-gray-600 hover:border-blue-500 hover:text-blue-600 transition-colors">
                                <i class="fa-solid fa-chevron-right text-xs"></i>
                            </button>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

</body>
</html>
