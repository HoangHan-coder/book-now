<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách đặt phòng - BookNow</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            light: '#60a5fa', // blue-400
                            DEFAULT: '#3b82f6', // blue-500
                            dark: '#2563eb', // blue-600
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Specific Logo Positioning Rule */
        .logo-fixed {
            position: fixed;
            top: 0;
            left: 0;
            margin-top: 25px;
            margin-left: 25px;
            z-index: 60; /* Higher than sidebar */
        }

        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gradient-icon {
            color: #3b82f6;
        }

        /* Sidebar transitions */
        .sidebar {
            transition: transform 0.3s ease-in-out;
        }

        /* Hide scrollbar for sidebar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Status Badge Colors */
        .status-pending { @apply bg-yellow-50 text-yellow-700 ring-1 ring-yellow-600/20; }
        .status-confirmed { @apply bg-blue-50 text-blue-700 ring-1 ring-blue-600/20; }
        .status-completed { @apply bg-green-50 text-green-700 ring-1 ring-green-600/20; }
        .status-cancelled { @apply bg-red-50 text-red-700 ring-1 ring-red-600/20; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

<!-- LOGO (Fixed Position) -->
<div class="logo-fixed flex items-center gap-3 select-none bg-white/90 backdrop-blur px-3 py-2 rounded-xl shadow-sm lg:shadow-none lg:bg-transparent lg:p-0">
    <div class="w-10 h-10 bg-white rounded-lg shadow-md flex items-center justify-center border border-blue-100">
        <i class="fa-solid fa-house-chimney gradient-icon text-xl"></i>
    </div>
    <div class="flex flex-col justify-center">
        <span class="text-2xl font-extrabold tracking-tight gradient-text leading-none">BookNow</span>
        <span class="text-[10px] text-gray-500 font-medium uppercase tracking-wider pl-0.5">Homestay System</span>
    </div>
</div>

<!-- MOBILE HEADER (Hamburger) -->
<div class="lg:hidden fixed top-0 w-full bg-white h-20 shadow-sm z-40 flex items-center justify-end px-6">
    <button id="mobileMenuBtn" class="text-gray-500 hover:text-blue-600 focus:outline-none">
        <i class="fa-solid fa-bars text-2xl"></i>
    </button>
</div>

<!-- SIDEBAR -->
<aside id="sidebar" class="sidebar fixed top-0 left-0 h-full w-64 bg-white border-r border-gray-200 z-50 transform -translate-x-full lg:translate-x-0 pt-28 overflow-y-auto no-scrollbar">
    <!-- Navigation Links -->
    <nav class="px-4 space-y-2">
        <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-lg font-medium transition-colors">
            <i class="fa-solid fa-chart-line w-5"></i>
            Bảng điều khiển
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 rounded-lg font-medium transition-colors shadow-sm ring-1 ring-black/5">
            <i class="fa-regular fa-calendar-check w-5"></i>
            Đơn đặt phòng
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-lg font-medium transition-colors">
            <i class="fa-solid fa-door-open w-5"></i>
            Phòng
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-lg font-medium transition-colors">
            <i class="fa-solid fa-users-gear w-5"></i>
            Khách hàng
        </a>
    </nav>

    <!-- Logout at Bottom -->
    <div class="absolute bottom-0 w-full p-4 border-t border-gray-100 bg-white">
        <a href="#" class="flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 rounded-lg font-medium transition-colors">
            <i class="fa-solid fa-arrow-right-from-bracket w-5"></i>
            Đăng xuất
        </a>
    </div>
</aside>

<!-- OVERLAY (for mobile) -->
<div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden glass-effect"></div>

<!-- MAIN CONTENT -->
<main class="lg:ml-64 min-h-screen pt-24 lg:pt-8 px-6 pb-10 transition-all duration-300">

    <!-- HEADER & ACTIONS -->
    <div class="flex flex-col md:flex-row md:items-end justify-between mb-6 gap-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">Danh sách đặt phòng</h1>
            <p class="text-sm text-gray-500 mt-1">Quản lý và theo dõi tất cả các đơn đặt phòng</p>
        </div>
    </div>
    <!-- Flash Message -->
    <div th:if="${successMessage}"
         class="mb-4 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg flex items-center gap-2">
        <i class="fa-solid fa-circle-check"></i>
        <span th:text="${successMessage}"></span>
    </div>

    <div th:if="${errorMessage}"
         class="mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg flex items-center gap-2">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span th:text="${errorMessage}"></span>
    </div>
    <!-- FILTERS CARD -->
    <!-- FILTERS CARD -->
    <form th:action="@{/admin/bookings}" method="get"
          class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-6">

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">

            <!-- Check-in -->
            <div class="space-y-1">
                <label class="text-xs font-medium text-gray-500 uppercase">Từ ngày</label>
                <div class="relative">
                    <input type="date"
                           name="checkIn"
                           th:value="${param.checkIn}"
                           class="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm
                       focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    <i class="fa-regular fa-calendar absolute left-3 top-2.5 text-gray-400"></i>
                </div>
            </div>

            <!-- Check-out -->
            <div class="space-y-1">
                <label class="text-xs font-medium text-gray-500 uppercase">Đến ngày</label>
                <div class="relative">
                    <input type="date"
                           name="checkOut"
                           th:value="${param.checkOut}"
                           class="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm
                       focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    <i class="fa-regular fa-calendar absolute left-3 top-2.5 text-gray-400"></i>
                </div>
            </div>

            <!-- Status -->
            <div class="space-y-1">
                <label class="text-xs font-medium text-gray-500 uppercase">Trạng thái</label>
                <div class="relative">
                    <select name="status"
                            th:value="${param.status}"
                            class="w-full pl-9 pr-8 py-2 border border-gray-300 rounded-lg text-sm
                        focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none appearance-none bg-white">

                        <option value="">Tất cả</option>
                        <option value="PENDING_PAYMENT">Chờ thanh toán</option>
                        <option value="PAID">Đã thanh toán</option>
                        <option value="CHECKED_IN">Đã nhận phòng</option>
                        <option value="CHECKED_OUT">Đã trả phòng</option>
                        <option value="COMPLETED">Hoàn thành</option>
                        <option value="FAILED">Thất bại</option>

                    </select>
                    <i class="fa-solid fa-filter absolute left-3 top-2.5 text-gray-400"></i>
                    <i class="fa-solid fa-chevron-down absolute right-3 top-3 text-xs text-gray-400 pointer-events-none"></i>
                </div>
            </div>

            <!-- Keyword -->
            <div class="space-y-1">
                <label class="text-xs font-medium text-gray-500 uppercase">Tìm kiếm</label>
                <div class="flex gap-2">
                    <div class="relative flex-1">
                        <input type="text"
                               name="keyword"
                               th:value="${param.keyword}"
                               placeholder="Nhập #BK hoặc tên khách..."
                               class="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm
                           focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-gray-400"></i>
                    </div>

                    <button type="submit"
                            class="bg-blue-600 hover:bg-blue-700 text-white
                        px-4 py-2 rounded-lg transition-colors">
                        Lọc
                    </button>
                </div>
            </div>

        </div>
    </form>

    <!-- TABLE SECTION -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 border-b border-gray-100">
                <tr>
                    <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Mã đặt phòng</th>
                    <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Khách hàng</th>
                    <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Số phòng</th>
                    <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Ngày nhận</th>
                    <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Ngày trả</th>
                    <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider">Trạng thái</th>
                    <th class="py-4 px-6 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">Hành động</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-50">
                <tr th:if="${not #lists.isEmpty(bookings)}"
                    th:each="booking : ${bookings}"
                    class="hover:bg-gray-50 transition-colors group">

                    <!-- Booking Code -->
                    <td class="py-4 px-6 font-medium text-gray-900"
                        th:text="${booking.bookingCode}">
                    </td>

                    <!-- Customer -->
                    <td class="py-4 px-6">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-purple-100 text-purple-600
                        flex items-center justify-center text-xs font-bold"
                                 th:text="${#strings.substring(booking.customer.fullName,0,1)}">
                            </div>
                            <div>
                                <p class="text-sm font-medium text-gray-900"
                                   th:text="${booking.customer.fullName}"></p>
                                <p class="text-xs text-gray-500"
                                   th:text="${booking.customer.phone}"></p>
                            </div>
                        </div>
                    </td>

                    <!-- Room Number -->
                    <td class="py-4 px-6 text-sm text-gray-600"
                        th:text="${booking.room.roomNumber}">
                    </td>

                    <!-- Check-in -->
                    <td class="py-4 px-6 text-sm text-gray-600"
                        th:text="${#temporals.format(booking.checkInTime, 'dd/MM/yyyy')}">
                    </td>

                    <!-- Check-out -->
                    <td class="py-4 px-6 text-sm text-gray-600"
                        th:text="${#temporals.format(booking.checkOutTime, 'dd/MM/yyyy')}">
                    </td>

                    <!-- Status -->
                    <td class="py-4 px-6">
    <span class="inline-flex items-center px-2.5 py-0.5
                 rounded-full text-xs font-medium"
          th:classappend="${booking.bookingStatus.getCssClass()}"
          th:text="${booking.bookingStatus.displayName}">
    </span>
                    </td>

                    <!-- Action -->
                    <td class="py-4 px-6 text-right">
                        <a th:href="@{/admin/booking-detail/{bookingCode}(bookingCode=${booking.bookingCode})}"
                           class="text-blue-600 hover:text-blue-900 font-medium text-sm">
                            Xem chi tiết
                        </a>
                    </td>

                </tr>
                <tr th:if="${#lists.isEmpty(bookings)}">
                    <td colspan="7" class="text-center py-10 text-gray-500">
                        Không tìm thấy booking theo yêu cầu
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->

    </div>

</main>

<!-- SCRIPT -->
<!-- SockJS and STOMP for WebSocket -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
    // Mobile Sidebar Toggle
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    function toggleSidebar() {
        const isClosed = sidebar.classList.contains('-translate-x-full');
        if (isClosed) {
            sidebar.classList.remove('-translate-x-full');
            sidebarOverlay.classList.remove('hidden');
        } else {
            sidebar.classList.add('-translate-x-full');
            sidebarOverlay.classList.add('hidden');
        }
    }

    mobileMenuBtn.addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', toggleSidebar);

    // WebSocket Connection for Real-time Booking Updates
    let stompClient = null;

    function connectWebSocket() {
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function(frame) {
            console.log('WebSocket Connected: ' + frame);

            // Subscribe to booking updates topic
            stompClient.subscribe('/topic/booking-updates', function(message) {
                const update = JSON.parse(message.body);
                handleBookingUpdate(update);
            });
        }, function(error) {
            console.error('WebSocket Connection Error:', error);
            // Retry connection after 5 seconds
            setTimeout(connectWebSocket, 5000);
        });
    }

    function handleBookingUpdate(update) {
        console.log('Received booking update:', update);

        // Find the booking row by booking code
        const rows = document.querySelectorAll('tbody tr');
        let bookingFound = false;

        rows.forEach(row => {
            const bookingCodeCell = row.querySelector('td:first-child');
            if (bookingCodeCell && bookingCodeCell.textContent.trim() === update.bookingCode) {
                bookingFound = true;
                // Update the status badge
                updateStatusBadge(row, update.bookingStatus);
                // Show notification
                showNotification(`Booking ${update.bookingCode} đã được cập nhật trạng thái`, 'success');
            }
        });

        // If booking is new or not in current view, reload the page
        if (!bookingFound && update.action === 'CREATED') {
            showNotification('Có booking mới! Trang sẽ tự động tải lại...', 'info');
            setTimeout(() => location.reload(), 2000);
        }
    }

    function updateStatusBadge(row, newStatus) {
        const statusCell = row.querySelector('td:nth-child(6) span');
        if (statusCell) {
            // Remove all status classes
            statusCell.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium';

            // Map status to display text and CSS class
            const statusMap = {
                'PENDING': { text: 'Chờ xử lý', class: 'status-pending' },
                'PENDING_PAYMENT': { text: 'Chờ thanh toán', class: 'status-pending' },
                'PAID': { text: 'Đã thanh toán', class: 'status-confirmed' },
                'CHECKED_IN': { text: 'Đã nhận phòng', class: 'status-confirmed' },
                'CHECKED_OUT': { text: 'Đã trả phòng', class: 'status-confirmed' },
                'COMPLETED': { text: 'Hoàn thành', class: 'status-completed' },
                'FAILED': { text: 'Thất bại', class: 'status-cancelled' },
                'REJECTED': { text: 'Từ chối', class: 'status-cancelled' }
            };

            const statusInfo = statusMap[newStatus] || { text: newStatus, class: 'status-pending' };
            statusCell.textContent = statusInfo.text;
            statusCell.classList.add(statusInfo.class);

            // Add animation
            row.classList.add('bg-blue-50');
            setTimeout(() => row.classList.remove('bg-blue-50'), 2000);
        }
    }

    function showNotification(message, type = 'info') {
        // Create notification element
        const notification = document.createElement('div');
        notification.className = `fixed top-4 right-4 z-50 px-6 py-4 rounded-lg shadow-lg transition-all transform translate-x-0 ${
            type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500'
        } text-white font-medium`;
        notification.textContent = message;

        document.body.appendChild(notification);

        // Auto remove after 5 seconds
        setTimeout(() => {
            notification.classList.add('translate-x-full', 'opacity-0');
            setTimeout(() => notification.remove(), 300);
        }, 5000);
    }

    // Connect when page loads
    document.addEventListener('DOMContentLoaded', function() {
        connectWebSocket();
    });

    // Disconnect when page unloads
    window.addEventListener('beforeunload', function() {
        if (stompClient !== null) {
            stompClient.disconnect();
        }
    });
</script>
</body>
</html>
