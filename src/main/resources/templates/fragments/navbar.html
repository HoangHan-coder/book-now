<div th:fragment="navbar" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <style>
        /* Specific Logo Positioning Rule */
        .logo-fixed {
            position: fixed;
            top: 0;
            left: 0;
            margin-top: 25px;
            margin-left: 25px;
            z-index: 60;
            /* Higher than navbar */
        }

        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Hero Background */
        .hero-bg {
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('https://images.unsplash.com/photo-1566073771259-6a8506099945?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            height: 550px;
        }

        /* Dropdown Animation */
        .dropdown-menu {
            transform-origin: top right;
            transition: transform 0.1s ease-out, opacity 0.1s ease-out;
        }

        .dropdown-hidden {
            transform: scale(0.95);
            opacity: 0;
            pointer-events: none;
        }

        .dropdown-visible {
            transform: scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        /* Horizontal Scroll Hide */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        /* Slot Button Styling */
        .slot-item {
            transition: all 0.2s ease;
        }

        .slot-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .slot-item.selected {
            background-color: #3b82f6;
            /* blue-600 */
            color: white;
            border-color: #3b82f6;
        }

        .slot-item.booked {
            background-color: #f3f4f6;
            /* gray-100 */
            color: #9ca3af;
            /* gray-400 */
            border-color: transparent;
            cursor: not-allowed;
        }

        .slot-item.booked:hover {
            transform: none;
            box-shadow: none;
        }

        /* Custom Table Styling */
        .schedule-table th {
            font-weight: 600;
            letter-spacing: 0.025em;
        }

        .schedule-table td {
            vertical-align: middle;
        }
    </style>
    <!-- LOGO (Fixed Position) -->
    <div class="logo-fixed flex items-center gap-3 select-none cursor-pointer"
         onclick="window.location.href='index.html'">
        <div class="w-10 h-10 bg-white rounded-lg shadow-md flex items-center justify-center border border-blue-100">
            <i class="fa-solid fa-house-chimney gradient-icon text-xl text-blue-600"></i>
        </div>
        <div class="flex flex-col justify-center">
            <span class="text-2xl font-extrabold tracking-tight text-white leading-none drop-shadow-md">BookNow</span>
            <span class="text-[10px] text-gray-100 font-medium uppercase tracking-wider pl-0.5 drop-shadow-sm">Homestay
                System</span>
        </div>
    </div>

    <!-- NAVBAR (Transparent Full Width) -->
    <nav class="fixed top-0 left-0 w-full flex justify-end items-center px-8 py-6 z-50 bg-gradient-to-b from-black/60 to-transparent transition-all duration-300"
         id="mainNavbar">
        <div class="flex items-center gap-8">
            <a href="#" class="text-sm font-medium text-white hover:text-blue-200 transition-colors drop-shadow-sm">Về
                chúng tôi</a>
            <a href="#" class="text-sm font-medium text-white hover:text-blue-200 transition-colors drop-shadow-sm">Liên
                hệ</a>

            <div class="flex items-center gap-3" sec:authorize="!isAuthenticated()">
                <a th:href="@{/auth/login}"
                   class="text-sm font-semibold text-white px-5 py-2.5 rounded-full shadow-md transition-all transform hover:text-blue-500 hover:-translate-y-0.5 active:translate-y-0">
                    Đăng nhập
                </a>
                <button
                        class="text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 px-5 py-2.5 rounded-full shadow-md transition-all transform hover:-translate-y-0.5 active:translate-y-0">
                    Đăng ký
                </button>
            </div>
            <!-- Profile Dropdown Container -->
            <div sec:authorize="isAuthenticated()">
                <div class="relative">
                    <button id="profileBtn" class="flex items-center gap-3 focus:outline-none group">
                        <div class="text-right hidden sm:block">
                            <p class="text-xs font-bold text-white group-hover:text-blue-100 transition-colors drop-shadow-sm" sec:authentication="principal.fullName"></p>
                            <p class="text-[10px] text-gray-200 group-hover:text-white transition-colors">Khách hàng</p>
                        </div>
                        <div
                                class="w-10 h-10 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center text-white border border-white/50 shadow-sm group-hover:bg-white group-hover:text-blue-600 transition-all">
                            <i class="fa-solid fa-user"></i>
                        </div>
                    </button>

                    <!-- Dropdown Menu -->
                    <div id="profileDropdown"
                         class="absolute right-0 mt-3 w-56 bg-white rounded-xl shadow-lg border border-gray-100 py-2 dropdown-menu dropdown-hidden z-50">
                        <div class="px-4 py-3 border-b border-gray-100">
                            <p class="text-sm font-medium text-gray-900">Tài khoản của tôi</p>
                            <p class="text-xs text-gray-500 truncate" sec:authentication="principal.fullName"></p>
                        </div>
                        <ul class="py-1">
                            <li>
                                <a href="register_profile.html"
                                   class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-blue-600">
                                    <i class="fa-regular fa-id-card mr-2 w-4"></i> Hồ sơ của tôi
                                </a>
                            </li>
                            <li>
                                <a href="#"
                                   class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-blue-600">
                                    <i class="fa-solid fa-clock-rotate-left mr-2 w-4"></i> Lịch sử đặt phòng
                                </a>
                            </li>
                        </ul>
                        <div class="border-t border-gray-100 mt-1 pt-1">
                            <a  th:href="@{/auth/logout}" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50">
                                <i class="fa-solid fa-arrow-right-from-bracket mr-2 w-4"></i> Đăng xuất
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

</div>
